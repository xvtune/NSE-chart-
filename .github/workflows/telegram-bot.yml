name: NSE Telegram Bot Listener

on:
  schedule:
    # Every 5 minutes, 06:00-19:00 UTC (covers Nairobi daytime/evening),
    # weekdays only. Adjust the hour range if you want it awake later
    # into the evening.
    - cron: "*/5 6-19 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for messages and reply
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_bot.py

      - name: Commit updated bot state
        run: |
          git config user.name "nse-watch-bot"
          git config user.email "actions@github.com"
          git pull --rebase
          git add nse_watch.db
          git diff --cached --quiet || git commit -m "Update bot state $(date -u +%Y-%m-%dT%H:%M)"
          git push
